services:
  postgres:
    image: postgres:16
    container_name: appointment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_appointment
      POSTGRES_USER: user_appointment
      POSTGRES_PASSWORD: pass_appointment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: appointment-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
